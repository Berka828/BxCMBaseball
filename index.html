<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BxCM Baseball</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* BACKGROUND (YOUR IMAGE) */
    #splash {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('splash-photo.png') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    /* SUBTLE DARK OVERLAY (15%) */
    #splash::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.15);
      top: 0;
      left: 0;
    }

    /* START BUTTON */
    #startBtn {
      position: relative;
      z-index: 2;
      padding: 20px 50px;
      font-size: 28px;
      border-radius: 50px;
      border: none;
      background: #FFC72C;
      color: #000;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255,199,44,0.6);
      transition: transform 0.2s ease;
    }

    #startBtn:hover {
      transform: scale(1.05);
    }

    /* GAME CANVAS */
    #gameCanvas {
      position: absolute;
      top: 0;
      left: 0;
    }

  </style>
</head>

<body>

  <!-- SPLASH -->
  <div id="splash">
    <button id="startBtn">START GAME</button>
  </div>

  <!-- GAME -->
  <canvas id="gameCanvas"></canvas>

  <!-- IMPORTANT: JS AT BOTTOM -->
  <script src="game.js"></script>

</body>
</html>
