<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bronx Children’s Museum - Baseball Blast</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="stageWrap">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>

    <!-- SPLASH SCREEN -->
    <div id="splashScreen" class="splashScreen">
      <div class="splashBackdrop"></div>
      <div class="splashGlow"></div>

      <div class="splashInner">
        <div class="splashPosterWrap">
          <img
            id="splashPoster"
            class="splashPoster"
            src="./splash-photo.png"
            alt="BxCM Junior Sluggers Academy splash poster"
          />
          <div class="splashShine"></div>
        </div>

        <div class="splashButtons">
          <button id="splashStartBtn" class="splashStartBtn">START GAME</button>
          <div class="splashHint">Press Start to begin</div>
        </div>
      </div>
    </div>

    <div class="overlay topBar">
      <div class="brandChip">
        <img src="./BxCM_Logo_FullColor_dark-backgrounds.png" alt="Bronx Children's Museum logo" class="brandLogo" />
      </div>

      <div class="titleChip">
        <div class="titleMain">BxCM JR. SLUGGERS ACADEMY</div>
        <div class="titleSub">Swing big. Make contact. Chase the high score.</div>
      </div>

      <div class="scoreChip">
        <div class="scoreLine"><span>Score</span><strong id="scoreEl">0</strong></div>
        <div class="scoreLine"><span>Pitches</span><strong id="pitchesEl">10</strong></div>
      </div>
    </div>

    <div class="overlay leftHud">
      <div class="hudCard hudYellow">
        <div class="hudLabel">Hits</div>
        <div class="hudValue" id="hitsEl">0</div>
      </div>
      <div class="hudCard hudPurple">
        <div class="hudLabel">Misses</div>
        <div class="hudValue" id="missesEl">0</div>
      </div>
      <div class="hudCard hudBlue">
        <div class="hudLabel">Best EV</div>
        <div class="hudValue" id="veloEl">0</div>
      </div>
    </div><div class="overlay miniMapWrap lowerMiniMap">
  <div class="miniMapCard">
    <div class="miniMapTitle">Ball Path</div>
    <canvas id="miniMapCanvas" width="220" height="130"></canvas>
  </div>
</div>

<div class="overlay bottomStatsBar">
  <div class="bottomStatCard">
    <div class="bottomStatLabel">Pitches</div>
    <div class="bottomStatValue" id="pitchesEl">10</div>
  </div>

  <div class="bottomStatCard">
    <div class="bottomStatLabel">Hits</div>
    <div class="bottomStatValue" id="hitsEl">0</div>
  </div>

  <div class="bottomStatCard homerCard">
    <div class="bottomStatLabel">Home Runs</div>
    <div class="bottomStatValue" id="homeRunsEl">0</div>
  </div>

  <div class="bottomStatCard">
    <div class="bottomStatLabel">Best Hit</div>
    <div class="bottomStatValue" id="bestHitEl">0</div>
  </div>
</div>

<div class="overlay controlDock">
  <button id="startBtn">Start Game</button>
  <button id="pauseBtn" class="secondary">Pause Game</button>
  <button id="resetBtn" class="secondary">Reset Game</button>
  <button id="muteBtn" class="secondary blueBtn">Sound: On</button>

  <div class="sideToggle">
    <button id="rightHandBtn" class="sideBtn active">Right</button>
    <button id="leftHandBtn" class="sideBtn">Left</button>
  </div>
</div>

    <div class="overlay bottomBar">
      <div class="instructionChip" id="instructionChip">
        Big upward swings can turn doubles into triples. Home runs trigger a giant celebration.
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <script src="./game.js"></script>
</body>
</html>
