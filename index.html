<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BxCM Baseball</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #gameCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
    }

    #splash {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(rgba(0,0,0,0.08), rgba(0,0,0,0.08)),
        url("./splash-photo.png") center center / cover no-repeat;
      overflow: hidden;
    }

    /* subtle motion only, no panel */
    #splash::before {
      content: "";
      position: absolute;
      inset: -2%;
      background: inherit;
      background:
        linear-gradient(rgba(0,0,0,0.08), rgba(0,0,0,0.08)),
        url("./splash-photo.png") center center / cover no-repeat;
      animation: splashPanZoom 18s ease-in-out infinite alternate;
      z-index: 0;
    }

    #startBtn {
      position: relative;
      z-index: 2;
      border: none;
      border-radius: 999px;
      padding: 20px 48px;
      font-size: clamp(24px, 3vw, 38px);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      color: #13223f;
      background: linear-gradient(180deg, #ffd84d 0%, #ffbe0b 100%);
      box-shadow:
        0 14px 34px rgba(255,190,11,0.30),
        0 0 0 4px rgba(255,255,255,0.10),
        0 0 40px rgba(255,212,59,0.22);
      transition: transform 180ms ease;
      animation: pulseBtn 1.6s ease-in-out infinite;
    }

    #startBtn:hover {
      transform: scale(1.03);
    }

    @keyframes pulseBtn {
      0% { transform: scale(1); }
      50% { transform: scale(1.035); }
      100% { transform: scale(1); }
    }

    @keyframes splashPanZoom {
      0% { transform: scale(1) translate3d(0,0,0); }
      100% { transform: scale(1.05) translate3d(-1.2%, -0.8%, 0); }
    }
  </style>
</head>
<body>
  <div id="splash">
    <button id="startBtn">Start Game</button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script src="./game.js"></script>
</body>
</html>
